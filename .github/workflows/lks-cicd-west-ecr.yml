name: LKS 2026 — Monitoring CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:        ${{ secrets.AWS_REGION }}
  MONITORING_REGION: ${{ secrets.MONITORING_REGION }}
  ECR_REGISTRY:      ${{ secrets.ECR_REGISTRY }}

# ═══════════════════════════════════════════════════════════
#  JOB 1 — install
#  Install Python deps and run basic import tests.
# ═══════════════════════════════════════════════════════════
jobs:
  install:
    name: Install & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install & test API
        working-directory: api
        run: |
          pip install -r requirements.txt
          python -c "import app; print('API import OK')"
          python -c "import db;  print('DB module OK')"
          python -c "import metrics; print('Metrics OK')"

      - name: Install & test Frontend
        working-directory: frontend
        run: |
          pip install -r requirements.txt
          python -c "import app; print('Frontend import OK')"

# ═══════════════════════════════════════════════════════════
#  JOB 2 — build_and_push_ecr
#  Build 1 Docker images → ECR us-west-2
#    lks-monitoring 
# ═══════════════════════════════════════════════════════════
  build_and_push_ecr:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.MONITORING_REGION }}

      - name: Login to ECR us-west-2
        run: |
          aws ecr get-login-password --region us-west-2 \
            | docker login --username AWS --password-stdin $WEST_ECR_REGISTRY

      - name: Build & push — Monitoring
        env: { IMAGE_TAG: "${{ github.sha }}" }
        run: |
          IMG="$ECR_REGISTRY/lks-monitoring"
          docker build -t "$IMG:$IMAGE_TAG" -t "$IMG:latest" ./api
          docker push "$IMG:$IMAGE_TAG" && docker push "$IMG:latest"
          echo "Pushed API: $IMG:$IMAGE_TAG"

      - name: Save image tag
        run: echo "${{ github.sha }}" > /tmp/image-tag.txt

      - uses: actions/upload-artifact@v4
        with: { name: image-tag, path: /tmp/image-tag.txt }